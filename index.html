<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ily ahh</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="doodles">
        <span class="doodle">🌸</span>
        <span class="doodle">✨</span>
        <span class="doodle">🎀</span>
        <span class="doodle">💕</span>
        <span class="doodle">🌈</span>
        <span class="doodle">⭐</span>
        <span class="doodle">🦋</span>
        <span class="doodle">🌺</span>
        <span class="doodle">💖</span>
        <span class="doodle">🎵</span>
    </div>

    <div class="main-container">
       
        <div class="clock-border"></div>

        <div class="clock-body">
          
            <video class="hello-kitty-video" src="assets/hello-kitty.av1.mp4" autoplay muted loop></video>

            
            <div class="digital-time" id="digitalTime">00:00:00</div>

         
            <div class="hand-container">
                <div class="sec" id="secHand"></div>
                <div class="min" id="minHand"></div>
                <div class="hour" id="hourHand"></div>
            </div>

            
            <div class="number number-12">12</div>
            <div class="number number-1">1</div>
            <div class="number number-2">2</div>
            <div class="number number-3">3</div>
            <div class="number number-4">4</div>
            <div class="number number-5">5</div>
            <div class="number number-6">6</div>
            <div class="number number-7">7</div>
            <div class="number number-8">8</div>
            <div class="number number-9">9</div>
            <div class="number number-10">10</div>
            <div class="number number-11">11</div>
        </div>
    </div>

    
    <div id="trigger" role="button" tabindex="0" aria-pressed="false" title="Toggle dark/light mode">
        <span class="toggle-icon">🌙</span>
    </div>

    
    <div class="timezone-display" id="timezoneDisplay">🌍 Your Time</div>

    <script src="./app.js"></script>
</body>

</html>
